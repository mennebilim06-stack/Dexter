{title:"Kapanış",body:`<p>Bu kitap boyunca, Dexter Morgan'ın anatomisini sekiz bölümde inceledik. Doğuşundan mirasına, kodundan ailesine, avcılığından düşmanlarına, psikolojisinden kültürel etkisine kadar her katmanı soymaya çalıştık.</p><p>Dexter Morgan, basit bir karakter değildi. O, insan doğasının en karanlık ve en aydınlık yanlarının bir arada var olabileceğinin kanıtıydı.</p><p>Bir psikopat sevebilir mi? Bir katil adalet sağlayabilir mi? Bir canavar insan olabilir mi? Dexter'ın hikayesi, bu sorulara kesin cevaplar vermedi. Ama sormamızı sağladı.</p><p>Ve belki de en önemli budur: <span class="highlight">sormak</span>. Karanlığı anlamak, ışığı takdir etmemizi sağlar.</p><div class="quote">"Herkesin içinde bir Karanlık Yolcu var. Tek fark, bazılarının onu daha iyi tanıması."<cite>— Dexter Morgan</cite></div><p><span class="blood-text">Kitap sona erdi. Ama Karanlık Yolcu, hâlâ bir yerlerde uyanık.</span></p>`},
{title:"Teşekkür ve Notlar",body:`<p>Bu dijital kitap, Dexter Morgan karakterinin edebi ve televizyon tarihinin derinlemesine bir analizini sunmak amacıyla hazırlanmıştır.</p><p>Dexter Morgan, Jeff Lindsay'ın roman karakteridir ve Showtime Networks'ün televizyon dizisi uyarlamasıdır. Bu kitap, ticari olmayan bir analiz çalışmasıdır.</p><p>Kitapta referans verilen alıntılar, kurgusal karakterin sözleri olarak dizinin senaryolarından ve romanlarından uyarlanmıştır.</p><p><span class="highlight">96 sayfa · 8 bölüm · 1 dijital kitap</span></p><p style="text-align:center;margin-top:40px;font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--blood-light);">— SON —</p>`},
]},
];

</script>
<script>
// ========== ENGINE ==========
let currentPage = 0; // 0 = cover
let fontSize = 1.05;
const allPages = [];

function buildPages() {
  chapters.forEach((ch, ci) => {
    ch.pages.forEach((pg, pi) => {
      allPages.push({
        globalIndex: ci * 12 + pi + 1,
        chapterIndex: ci,
        pageIndex: pi,
        chapterTitle: ch.title,
        chapterNum: ci + 1,
        pageTitle: pg.title,
        body: pg.body
      });
    });
  });
}

function renderSidebar() {
  const nav = $('sidebarNav');
  nav.innerHTML = chapters.map((ch, ci) => {
    const pages = ch.pages.map((pg, pi) => {
      const globalIdx = ci * 12 + pi + 1;
      return `<div class="page-item" data-page="${globalIdx}" onclick="jumpTo(${globalIdx})">${pg.title}</div>`;
    }).join('');
    return `
      <div class="chapter-group">
        <div class="chapter-title" data-ch="${ci}" onclick="toggleChapter(${ci})">
          <span class="ch-num">${String(ci+1).padStart(2,'0')}</span>
          ${ch.title}
        </div>
        <div class="page-list" id="chPages${ci}">${pages}</div>
      </div>`;
  }).join('');
}

function toggleChapter(ci) {
  const el = $('chPages' + ci);
  el.classList.toggle('open');
}

function renderPage(idx) {
  currentPage = idx;
  const content = $('pageContent');
  const reader = $('reader');
  reader.scrollTop = 0;

  if (idx === 0) {
    content.innerHTML = `
      <div class="cover">
        <div class="cover-line"></div>
        <h1>DEXTER <span class="red">MORGAN</span></h1>
        <div class="cover-sub">Karanlık Yolcunun Anatomisi</div>
        <div class="cover-line"></div>
        <div class="cover-meta">Dijital Kitap · 96 Sayfa · 8 Bölüm</div>
        <button class="start-btn" onclick="jumpTo(1)">Okumaya Başla</button>
      </div>`;
    $('breadcrumb').innerHTML = 'Kapak';
    $('pageIndicator').textContent = '— / 96';
    $('navCenter').textContent = 'Kapak';
    $('prevBtn').disabled = true;
    $('nextBtn').disabled = false;
    updateSidebarActive();
    return;
  }

  const pg = allPages[idx - 1];
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = '';

  content.innerHTML = `
    <div class="page-header">
      <div class="page-number">BÖLÜM ${pg.chapterNum} · SAYFA ${pg.globalIndex}</div>
      <div class="page-title">${pg.pageTitle}</div>
    </div>
    <div class="body-text">${pg.body}</div>`;

  $('breadcrumb').innerHTML = `Bölüm ${pg.chapterNum} <span>·</span> ${pg.chapterTitle}`;
  $('pageIndicator').textContent = `${pg.globalIndex} / 96`;
  $('navCenter').textContent = `Sayfa ${pg.globalIndex} / 96`;
  $('prevBtn').disabled = false;
  $('nextBtn').disabled = idx >= 96;
  updateSidebarActive();
}

function updateSidebarActive() {
  document.querySelectorAll('.chapter-title').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.page-item').forEach(el => el.classList.remove('active'));
  if (currentPage === 0) return;
  const pg = allPages[currentPage - 1];
  const chTitle = document.querySelector(`.chapter-title[data-ch="${pg.chapterIndex}"]`);
  if (chTitle) { chTitle.classList.add('active'); }
  const pgList = $('chPages' + pg.chapterIndex);
  if (pgList && !pgList.classList.contains('open')) pgList.classList.add('open');
  const pgItem = document.querySelector(`.page-item[data-page="${pg.globalIndex}"]`);
  if (pgItem) pgItem.classList.add('active');
}

function goPage(dir) {
  const next = currentPage + dir;
  if (next >= 0 && next <= 96) jumpTo(next);
}

function jumpTo(idx) {
  renderPage(idx);
  closeSidebar();
}

function changeFont(dir) {
  fontSize = Math.max(0.85, Math.min(1.4, fontSize + dir * 0.08));
  document.querySelectorAll('.body-text').forEach(el => el.style.fontSize = fontSize + 'rem');
}

function toggleSidebar() {
  $('sidebar').classList.toggle('open');
  $('overlay').classList.toggle('show');
}
function closeSidebar() {
  $('sidebar').classList.remove('open');
  $('overlay').classList.remove('show');
}

const $ = id => document.getElementById(id);

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPage(-1);
});

// Init
buildPages();
renderSidebar();
renderPage(0);
</script>
